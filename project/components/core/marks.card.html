<!-- @dsCard group="Components" viewport="700x230" name="Eyebrow & StatBlock" subtitle="Section kicker and big numerals" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page)}
#r{padding:26px 24px;display:flex;flex-direction:column;gap:22px}
.stats{display:flex;gap:40px}
.dark{background:var(--ink-800);padding:22px 24px;border-radius:var(--radius-sm);display:flex;gap:40px}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body><div id="r"></div>
<script type="text/babel">
const NS = Object.values(window).find(v => v && v.Eyebrow && v.StatBlock) || {};
const { Eyebrow, StatBlock } = NS;
function Demo(){
  return (<>
    <div>
      <Eyebrow>Market entry into Russia</Eyebrow>
      <div className="stats">
        <StatBlock value="90 days" label="to a working local entity" />
        <StatBlock value="6+" label="sectors we operate in" />
        <StatBlock value="One team" label="entry, sales and operations" />
      </div>
    </div>
    <div className="dark">
      <StatBlock value="01" label="Assess" onDark size="lg" />
      <StatBlock value="02" label="Establish" onDark size="lg" />
      <StatBlock value="03" label="Launch" onDark size="lg" />
    </div>
  </>);
}
ReactDOM.createRoot(document.getElementById('r')).render(<Demo/>);
</script>
</body></html>
