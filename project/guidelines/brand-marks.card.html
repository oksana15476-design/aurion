<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark & marks" subtitle="AURION logotype, gold dot, eyebrow rule" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page);color:var(--text-primary)}
.wrap{padding:26px 24px;display:flex;align-items:center;gap:46px}
.mark{display:flex;align-items:baseline;gap:10px}
.mark b{font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:var(--tracking-wordmark)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);align-self:center}
.eyebrow{display:flex;align-items:center;gap:12px}
.eyebrow .rule{width:30px;height:1px;background:var(--accent)}
.eyebrow .t{font-size:var(--eyebrow-size);font-weight:600;letter-spacing:var(--eyebrow-tracking);text-transform:uppercase;color:var(--accent)}
.num{font-family:var(--font-display);font-weight:700;color:var(--accent);font-size:30px;letter-spacing:-.02em}
</style></head><body>
<div class="wrap">
  <div class="mark"><b>AURION</b><span class="dot"></span></div>
  <div class="eyebrow"><span class="rule"></span><span class="t">Approach</span></div>
  <div class="num">01 / 02 / 03</div>
</div>
</body></html>
