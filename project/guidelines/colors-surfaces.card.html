<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & Ink" subtitle="Parchment surfaces and warm near-black ink" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page)}
.row{display:flex;gap:0;padding:18px}
.sw{flex:1;height:110px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;border:1px solid var(--line)}
.sw b{font-size:12px;font-weight:600}.sw span{font-size:11px;opacity:.7;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--parchment-100);color:var(--ink-800)"><b>Page</b><span>#F3EFE7</span></div>
  <div class="sw" style="background:var(--parchment-200);color:var(--ink-800)"><b>Sunken</b><span>#EFE9DD</span></div>
  <div class="sw" style="background:var(--ink-800);color:var(--parchment-100)"><b>Ink 800</b><span>#15120E</span></div>
  <div class="sw" style="background:var(--ink-900);color:var(--parchment-100)"><b>Footer</b><span>#0E0C09</span></div>
</div>
</body></html>
