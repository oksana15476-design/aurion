<!-- @dsCard group="Spacing" viewport="700x190" name="Hairline grid" subtitle="1px ink-alpha grid between bordered cells" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page);color:var(--text-primary)}
.wrap{padding:22px 24px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
.cell{background:var(--surface-card);padding:20px 18px;min-height:90px}
.n{font-family:var(--font-display);font-weight:700;color:var(--accent);font-size:13px;letter-spacing:.1em}
.t{font-family:var(--font-display);font-weight:600;font-size:18px;margin-top:14px;letter-spacing:var(--tracking-tight)}
</style></head><body>
<div class="wrap"><div class="grid">
  <div class="cell"><div class="n">01</div><div class="t">Market Entry</div></div>
  <div class="cell"><div class="n">02</div><div class="t">Sales Launch</div></div>
  <div class="cell"><div class="n">03</div><div class="t">Venture Building</div></div>
</div></div>
</body></html>
