<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px rhythm, section padding 108px" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page);color:var(--text-primary)}
.wrap{padding:22px 24px;display:flex;align-items:flex-end;gap:14px}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{width:30px;background:var(--ink-800);border-radius:var(--radius-xs)}
.col span{font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="wrap">
  <div class="col"><div class="bar" style="height:8px"></div><span>8</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span>16</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span>24</span></div>
  <div class="col"><div class="bar" style="height:32px"></div><span>32</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span>48</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span>64</span></div>
  <div class="col"><div class="bar" style="height:80px"></div><span>80</span></div>
  <div class="col"><div class="bar" style="height:108px;background:var(--accent)"></div><span>108 · section</span></div>
</div>
</body></html>
