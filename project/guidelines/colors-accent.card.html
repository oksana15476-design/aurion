<!-- @dsCard group="Colors" viewport="700x150" name="Accent & Text" subtitle="One champagne-gold accent; warm stone text" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page)}
.row{display:flex;gap:0;padding:18px}
.sw{flex:1;height:110px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;border:1px solid var(--line)}
.sw b{font-size:12px;font-weight:600}.sw span{font-size:11px;opacity:.7;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--gold-500);color:var(--ink-800)"><b>Accent</b><span>#A87C3D</span></div>
  <div class="sw" style="background:var(--gold-300);color:var(--ink-800)"><b>On dark</b><span>#CDA869</span></div>
  <div class="sw" style="background:var(--parchment-100);color:var(--stone-600)"><b>Secondary</b><span>#574F40</span></div>
  <div class="sw" style="background:var(--parchment-100);color:var(--stone-500)"><b>Muted</b><span>#8A8270</span></div>
</div>
</body></html>
