<!-- @dsCard group="Type" viewport="700x180" name="Body & Eyebrow" subtitle="Hanken Grotesk body; uppercase tracked eyebrow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page);color:var(--text-primary)}
.wrap{padding:22px 24px;max-width:560px}
.eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.eyebrow span.rule{width:30px;height:1px;background:var(--accent)}
.eyebrow span.t{font-size:var(--eyebrow-size);font-weight:600;letter-spacing:var(--eyebrow-tracking);text-transform:uppercase;color:var(--accent)}
.lead{font-size:var(--body-lg);line-height:var(--leading-normal);color:var(--text-secondary);margin:0 0 12px}
.body{font-size:var(--body-md);line-height:var(--leading-relaxed);color:var(--text-secondary);margin:0}
.meta{font-family:var(--font-body);color:var(--text-muted);font-size:11px;letter-spacing:.04em;margin-top:12px}
</style></head><body>
<div class="wrap">
  <div class="eyebrow"><span class="rule"></span><span class="t">Market entry into Russia</span></div>
  <p class="lead">Market entry, sales launch and venture building.</p>
  <p class="body">A local entity that is ready to operate, not a slide deck. We sell — we don't just advise.</p>
  <p class="meta">Hanken Grotesk · 400/500 · 20px lead / 17px body</p>
</div>
</body></html>
